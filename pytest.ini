[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
norecursedirs = pyjx2 .git __pycache__ *.egg-info build dist
filterwarnings = ignore::pytest.PytestCollectionWarning
markers =
    unit: Unit tests (fast, no I/O)
    acceptance: Acceptance tests (end-to-end flows, mocked infrastructure)
